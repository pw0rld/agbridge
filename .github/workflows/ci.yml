name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: vet + build + race test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build (all packages)
        run: go build ./...

      - name: go test -race
        run: go test -race -count=1 ./...
