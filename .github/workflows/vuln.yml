name: vuln

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  govulncheck:
    name: govulncheck ./...
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: run govulncheck
        run: govulncheck ./...

      - name: file issue on vulnerability
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          SERVER: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          DATE="$(date +%Y-%m-%d)"
          URL="${SERVER}/${REPO}/actions/runs/${RUN_ID}"
          gh issue create \
            --title "govulncheck: vulnerabilities detected ${DATE}" \
            --label security \
            --body "Weekly govulncheck failed. Inspect the run log: ${URL}"
